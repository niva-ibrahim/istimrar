<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>خريطة الطموح — استمرار</title>
    <meta name="theme-color" content="#02070B" />
    <style>
      html, body { margin: 0; background: var(--color-bg, #02070B); }
    </style>
    <script>
      // ضبط الثيم مبكراً قبل الرسم لتفادي وميض اللون
      try {
        var t = localStorage.getItem("istimrar_theme") === "light" ? "light" : "dark";
        document.documentElement.setAttribute("data-theme", t);
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
